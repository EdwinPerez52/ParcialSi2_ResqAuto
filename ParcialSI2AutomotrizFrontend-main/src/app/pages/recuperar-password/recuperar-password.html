<div class="auth-container">
  <div class="auth-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-icon">🔑</span>
        <h1 class="brand-name">Recuperar<span class="accent">Cuenta</span></h1>
      </div>
      <p class="brand-subtitle">
        @if (paso === 1) {
          Ingresa tu correo para recuperar tu contraseña
        } @else {
          Establece tu nueva contraseña
        }
      </p>
    </div>

    @if (paso === 1) {
      <form (ngSubmit)="solicitarReset()" class="auth-form">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" [(ngModel)]="correo" name="correo" class="form-input" placeholder="ejemplo&#64;correo.com" required id="recover-email" />
          </div>
        </div>

        @if (mensaje) {
          <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">
            {{ mensaje }}
          </div>
        }

        <button type="submit" class="btn-submit" [disabled]="loading" id="recover-submit">
          @if (loading) {
            <span class="spinner"></span> Enviando...
          } @else {
            Recuperar contraseña
          }
        </button>
      </form>
    }

    @if (paso === 2) {
      <form (ngSubmit)="resetearPassword()" class="auth-form">
        <div class="form-group">
          <label class="form-label">Nueva contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" [(ngModel)]="nuevaContrasena" name="nuevaContrasena" class="form-input" placeholder="Mínimo 6 caracteres" required id="recover-new-password" />
          </div>
        </div>

        @if (mensaje) {
          <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">
            {{ mensaje }}
          </div>
        }

        <button type="submit" class="btn-submit" [disabled]="loading" id="recover-reset-submit">
          @if (loading) {
            <span class="spinner"></span> Actualizando...
          } @else {
            Actualizar contraseña
          }
        </button>
      </form>
    }

    <div class="auth-links">
      <a routerLink="/login" class="auth-link">← Volver al login</a>
    </div>
  </div>
</div>
