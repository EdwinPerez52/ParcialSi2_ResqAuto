<div class="auth-container">
  <div class="auth-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-icon">🚗</span>
        <h1 class="brand-name">ResQ<span class="accent">Auto</span></h1>
      </div>
      <p class="brand-subtitle">Crear nueva cuenta</p>
    </div>

    <form (ngSubmit)="registrar()" class="auth-form">
      <!-- Selector de rol -->
      <div class="form-group">
        <label class="form-label">Tipo de cuenta</label>
        <div class="role-selector">
          <button type="button" class="role-btn" [class.active]="rol === 'conductor'" (click)="rol = 'conductor'">
            🚙 Conductor
          </button>
          <button type="button" class="role-btn" [class.active]="rol === 'administrador_taller'" (click)="rol = 'administrador_taller'">
            🔧 Taller
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nombre completo *</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" [(ngModel)]="nombre_completo" name="nombre_completo" class="form-input" placeholder="Tu nombre completo" required id="reg-name" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Correo Electrónico *</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input type="email" [(ngModel)]="correo" name="correo" class="form-input" placeholder="ejemplo&#64;correo.com" required id="reg-email" />
        </div>
      </div>

      @if (rol === 'conductor') {
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <div class="input-wrapper">
            <span class="input-icon">📱</span>
            <input type="tel" [(ngModel)]="telefono" name="telefono" class="form-input" placeholder="+591 70000000" id="reg-phone" />
          </div>
        </div>
      }

      @if (rol === 'administrador_taller') {
        <div class="form-group">
          <label class="form-label">Nombre comercial del taller *</label>
          <div class="input-wrapper">
            <span class="input-icon">🏪</span>
            <input type="text" [(ngModel)]="nombre_comercial" name="nombre_comercial" class="form-input" placeholder="Mi Taller Mecánico" id="reg-comercial" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">NIT</label>
            <div class="input-wrapper">
              <span class="input-icon">🏢</span>
              <input type="text" [(ngModel)]="nit" name="nit" class="form-input" placeholder="1234567" id="reg-nit" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Dirección</label>
            <div class="input-wrapper">
              <span class="input-icon">📍</span>
              <input type="text" [(ngModel)]="direccion" name="direccion" class="form-input" placeholder="Av. Principal #123" id="reg-direccion" />
            </div>
          </div>
        </div>
      }

      <div class="form-group">
        <label class="form-label">Contraseña *</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="contrasena" name="contrasena" class="form-input" placeholder="Mínimo 6 caracteres" required id="reg-password" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmar contraseña *</label>
        <div class="input-wrapper">
          <span class="input-icon">🔐</span>
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmarContrasena" name="confirmarContrasena" class="form-input" placeholder="Repite tu contraseña" required id="reg-confirm" />
        </div>
      </div>

      @if (mensaje) {
        <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">
          {{ mensaje }}
        </div>
      }

      <button type="submit" class="btn-submit" [disabled]="loading" id="reg-submit">
        @if (loading) {
          <span class="spinner"></span> Registrando...
        } @else {
          Crear cuenta
        }
      </button>
    </form>

    <div class="auth-links">
      <div class="auth-divider">
        <span>¿Ya tienes cuenta?</span>
        <a routerLink="/login" class="auth-link highlight">Inicia sesión</a>
      </div>
    </div>
  </div>
</div>
